<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Initiate Live Session | Gouldbourne</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>

<header>
  <div class="container">
    <h2 style="margin:0; display:inline-block; color:var(--gold-bright);">GO(U)LDBO(U)RNE</h2>
    <nav style="display:inline-block; margin-left:2rem; width: calc(100% - 150px);">
      <button class="menu-toggle" onclick="toggleMenu()">☰ Menu</button>
      <ul id="mainMenu">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../about/index.html">About</a></li>
        <li><a href="../credentials/index.html">Credentials</a></li>
        <li><a href="../blog/index.html">Blog</a></li>
        <li><a href="../work/index.html">Work</a></li>
        <li><a href="index.html" class="active">Connect</a></li>
        <li><a href="javascript:history.back()" class="back-link">Back</a></li>
      </ul>
    </nav>
  </div>
</header>

<div class="logo-banner">
  <div class="logo-scroll auto" id="clientScroll"></div>
</div>

<footer>
  <div class="container">
    <p>© 2026 Micheal | Gouldbourne
      <a href="../legal/privacy.html">Privacy Policy</a> |
      <a href="../legal/terms.html">Terms of Use</a>
    </p>
  </div>
</footer>

<script>
function toggleMenu() {
  const btn = document.querySelector('.menu-toggle');
  const menu = document.getElementById('mainMenu');
  btn.classList.toggle('active');
  menu.classList.toggle('active');
}

window.addEventListener('scroll', () => {
  document.body.classList.toggle('scrolled', window.scrollY > 200);
});

async function loadClients() {
  try {
    const res = await fetch('../registry/clients.json');
    const data = await res.json();
    const clients = data.clients;
    const container = document.getElementById('clientScroll');
    let html = '';

    // 3 COPIES = NO BLANK SPACE, FULL CONTINUOUS LOOP
    for (let loop = 0; loop < 3; loop++) {
      clients.forEach(client => {
        const content = client.logo
          ? `<img src="../assets/images/clients/${client.logo}" alt="${client.name}" class="client-logo">`
          : `${client.name}`;
        html += `<div class="client-item"><a href="${client.url}" target="_blank" rel="noopener noreferrer">${content}</a></div>`;
      });
    }

    container.innerHTML = html;
    initCarousel();
  } catch (err) {
    console.error('Error loading clients:', err);
  }
}

// VERSION 2.0 — SCROLL WORKS, NO JUMPS, ALWAYS VISIBLE
function initCarousel() {
  const banner = document.querySelector('.logo-banner');
  const scroll = document.querySelector('.logo-scroll');
  if (!banner || !scroll) return;

  let isDown = false, startX, currentX;

  // --- MOUSE ---
  banner.addEventListener('mousedown', e => {
    isDown = true;
    banner.classList.add('dragging');
    startX = e.pageX - banner.offsetLeft;
    // CAPTURE EXACT POSITION — NO JUMP
    const transform = getComputedStyle(scroll).transform;
    const matrix = new DOMMatrixReadOnly(transform);
    currentX = matrix.m41;
    e.preventDefault();
  });

  banner.addEventListener('mouseup', () => {
    isDown = false;
    banner.classList.remove('dragging');
    // RESTART FROM SAME SPOT — NO SNAP
    scroll.style.animation = 'none';
    void scroll.offsetWidth;
    scroll.style.animation = 'scrollLoop 45s linear infinite';
  });

  banner.addEventListener('mouseleave', () => {
    if (!isDown) return;
    isDown = false;
    banner.classList.remove('dragging');
    // SAME SAFE RESTART
    scroll.style.animation = 'none';
    void scroll.offsetWidth;
    scroll.style.animation = 'scrollLoop 45s linear infinite';
  });

  banner.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - banner.offsetLeft;
    const move = (x - startX) * 1.5;
    // SMOOTH DRAG — NO BREAKS
    scroll.style.transform = `translateX(${currentX + move}px)`;
  });

  // --- TOUCH ---
  banner.addEventListener('touchstart', e => {
    isDown = true;
    banner.classList.add('dragging');
    startX = e.touches[0].pageX - banner.offsetLeft;
    // CAPTURE POSITION ON EVERY TOUCH — NO JUMP ON RELEASE
    const transform = getComputedStyle(scroll).transform;
    const matrix = new DOMMatrixReadOnly(transform);
    currentX = matrix.m41;
  }, { passive: true });

  banner.addEventListener('touchend', () => {
    isDown = false;
    banner.classList.remove('dragging');
    // RESTART SMOOTHLY — NO SNAP
    scroll.style.animation = 'none';
    void scroll.offsetWidth;
    scroll.style.animation = 'scrollLoop 45s linear infinite';
  });

  banner.addEventListener('touchmove', e => {
    if (!isDown) return;
    const x = e.touches[0].pageX - banner.offsetLeft;
    const move = (x - startX) * 1.5;
    // SCRUB WORKS PERFECTLY
    scroll.style.transform = `translateX(${currentX + move}px)`;
  }, { passive: true });
}

loadClients();
</script>

</body>
</html>
