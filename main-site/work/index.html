<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work | Gouldbourne</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>

<header>
  <div class="container">
    <h2 style="color:var(--gold-bright); display:inline-block;">GO(U)LDBO(U)RNE</h2>
  </div>
</header>

<main class="container">
  <h1>Selected Clients</h1>
</main>

<div class="logo-banner">
  <div class="logo-scroll" id="clientScroll"></div>
</div>

<footer style="text-align:center; padding:2rem 0; color:var(--text-muted);">
  © 2026 Gouldbourne
</footer>

<script>
let autoSpeed = 0.08; // lower = slower
let scrollPos = 0;
let isDragging = false;
let startX, startPos;
let animationFrame;

async function loadClients() {
  try {
    const res = await fetch('../registry/clients.json');
    const data = await res.json();
    const clients = data.clients;
    const container = document.getElementById('clientScroll');
    let html = '';

    // 3 copies = seamless infinite loop, no blank space
    for (let i = 0; i < 3; i++) {
      clients.forEach(c => {
        html += `<div class="client-item">
          <a href="${c.url}" target="_blank">
            <img src="../assets/images/clients/${c.logo}" alt="${c.name}" class="client-logo">
          </a>
        </div>`;
      });
    }

    container.innerHTML = html;
    initCarousel();
  } catch (err) {
    console.error('Load error:', err);
  }
}

function initCarousel() {
  const banner = document.querySelector('.logo-banner');
  const scroll = document.querySelector('.logo-scroll');
  const contentWidth = scroll.scrollWidth / 3;

  // --- MOUSE EVENTS ---
  banner.addEventListener('mousedown', e => {
    isDragging = true;
    banner.classList.add('dragging');
    startX = e.clientX;
    startPos = scrollPos;
    cancelAnimationFrame(animationFrame);
    e.preventDefault();
  });

  banner.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const delta = (e.clientX - startX) * 1.2;
    scrollPos = startPos + delta;
    wrapPosition();
    updateTransform();
  });

  banner.addEventListener('mouseup', endDrag);
  banner.addEventListener('mouseleave', endDrag);

  // --- TOUCH EVENTS ---
  banner.addEventListener('touchstart', e => {
    isDragging = true;
    banner.classList.add('dragging');
    startX = e.touches[0].clientX;
    startPos = scrollPos;
    cancelAnimationFrame(animationFrame);
  }, { passive: true });

  banner.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const delta = (e.touches[0].clientX - startX) * 1.2;
    scrollPos = startPos + delta;
    wrapPosition();
    updateTransform();
  }, { passive: true });

  banner.addEventListener('touchend', endDrag);

  // --- Helpers ---
  function endDrag() {
    if (!isDragging) return;
    isDragging = false;
    banner.classList.remove('dragging');
    startAutoScroll();
  }

  function wrapPosition() {
    // Keeps position in bounds, no blank space
    if (scrollPos > 0) scrollPos -= contentWidth;
    if (scrollPos < -contentWidth) scrollPos += contentWidth;
  }

  function updateTransform() {
    scroll.style.transform = `translateX(${scrollPos}px)`;
  }

  function startAutoScroll() {
    function animate() {
      if (!isDragging) {
        scrollPos -= autoSpeed;
        wrapPosition();
        updateTransform();
      }
      animationFrame = requestAnimationFrame(animate);
    }
    animate();
  }

  // Start running instantly, visible immediately
  startAutoScroll();
}

loadClients();
</script>

</body>
</html>
